## You CAN edit the following:
{{serverEndpoints}}
sv_maxclients {{maxClients}}
set steam_webApiKey "none"
sets tags "default, deployer, qbox, bluecoast"

## You MAY edit the following:
sv_licenseKey "{{svLicense}}"
sv_hostname "{{serverName}} — Bluecoast Roleplay ({{recipeName}})"
sets sv_projectName "[Bluecoast] {{serverName}}"
sets sv_projectDesc "{{recipeDescription}}"
sets locale "en-US"
load_server_icon myLogo.png
set sv_enforceGameBuild 3407
set mysql_connection_string "{{dbConnectionString}}"

# Policesystem / bc-mdt dev helpers (restrict in production)
add_ace group.admin command.testbac allow
add_ace group.admin command.testfp allow

# Chat config
set resources_useSystemChat true
set qbx_chat:joinMessage "^2%s joined the server"
set qbx_chat:quitMessage "^1%s left the server (%s)"

# Voice config
exec voice.cfg

# Qbox config
setr qb_locale "en"
setr qbx:enableBridge "true"
set qbx:enableQueue "true"
set qbx:bucketLockdownMode "inactive"
set qbx:discordLink "discord.gg/qbox"
set qbx:max_jobs_per_player 1
set qbx:max_gangs_per_player 1
set qbx:setjob_replaces "true"
set qbx:setgang_replaces "true"
set qbx:cleanPlayerGroups "true"
set qbx:allowMethodOverrides "true"
set qbx:disableOverrideWarning "false"
setr qbx:enableVehiclePersistence "false"
setr qbx:vehiclePersistenceType "semi"
set qbx:acknowledge "true"
setr qbx:enableGroupManagement "true"

setr qbx:motd "<p style='padding: 1rem; background-color: #141517; border: 1px solid #373a40; border-radius: 0.5rem; text-align: center;'><span style='color: rgb(200, 200, 40);'>Welcome to Bluecoast!</span><br>Learn more at <span id='link' style='color: rgb(100, 100, 255);' onclick='window.invokeNative(\"openUrl\", \"https://docs.qbox.re/\")'>docs.qbox.re</span></p><style>span#link:hover { cursor: pointer; }</style>"

setr illenium-appearance:locale "en"
setr weather_disablecd true

exec ox.cfg

# Phone — add your resource + ox_inventory item when ready (NPWD not installed by this recipe).

# bc-mdt — set your FiveManage API key in txAdmin or here after deploy (never commit real keys).
setr bc_mdt_fivemanage_key ""

setr loadscreen:externalShutdown true
set loadscreen:primaryColor "#f1e542"
set loadscreen:shadowColor "#1a18077f"

ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
stop basic-gamemode
ensure hardcap
ensure baseevents

ensure ox_lib
ensure qbx_core
ensure ox_target
ensure [ox]
# qbx_idcard depends on MugShotBase64; [qbx] is ensured before [standalone] so start this first
ensure MugShotBase64
ensure [qbx]
ensure [standalone]
ensure [voice]
ensure [assets]

{{addPrincipalsMaster}}
exec permissions.cfg

exec misc.cfg
