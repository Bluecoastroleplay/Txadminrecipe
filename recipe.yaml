$engine: 3
$onesync: on
name: Bluecoast Qbox (custom)
version: 1.0.6
author: Bluecoast Roleplay
description: Bluecoast Qbox — slim Qbox+Ox stack (pma-voice, mm_radio, qbx_chat_theme, Bluecoast radial, scoreboard) + Bluecoast resources (HUD, sat map, illenium-appearance, MDT, drugs, pillbox). Items from Oxdata. No NPWD; no safecracker/mhacking/prison/heist minigame packs.

tasks:
  #  Download Base Files
  - action: download_github
    src: https://github.com/qbox-project/txAdminRecipe
    ref: main
    dest: ./tmp/qbox

  # server.cfg: clone this recipe repo (works when deploy only fetches recipe.yaml; avoids stale txAdmin cache on raw URLs)
  - action: download_github
    src: https://github.com/Bluecoastroleplay/Txadminrecipe
    ref: main
    dest: ./tmp/bc-recipe
  - action: move_path
    src: ./tmp/bc-recipe/server.cfg
    dest: ./server.cfg

  - action: move_path
    src: ./tmp/qbox/permissions.cfg
    dest: ./permissions.cfg

  - action: move_path
    src: ./tmp/qbox/ox.cfg
    dest: ./ox.cfg

  - action: move_path
    src: ./tmp/qbox/voice.cfg
    dest: ./voice.cfg

  - action: move_path
    src: ./tmp/qbox/misc.cfg
    dest: ./misc.cfg

  - action: move_path
    src: ./tmp/qbox/myLogo.png
    dest: ./myLogo.png

  # Prepare Database
  - action: connect_database
  - action: query_database
    file: ./tmp/qbox/qbox.sql

  # STANDALONE
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/chat

  - action: download_github
    dest: ./resources/[standalone]/bob74_ipl
    ref: master
    src: https://github.com/Bob74/bob74_ipl

  - action: download_file
    path: ./tmp/screencapture.zip
    url: https://github.com/itschip/screencapture/releases/latest/download/screencapture.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/screencapture.zip

  - action: download_github
    dest: ./resources/[standalone]/scully_emotemenu
    ref: main
    src: https://github.com/Scullyy/scully_emotemenu

  - action: download_file
    path: ./tmp/Renewed-Banking.zip
    url: https://github.com/Renewed-Scripts/Renewed-Banking/releases/latest/download/Renewed-Banking.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/Renewed-Banking.zip

  # ZIP archive avoids download_github HTTP 300 on some GitHub renames/redirects; extracts as illenium-appearance-main then rename to resource folder
  - action: download_file
    path: ./tmp/illenium-appearance.zip
    url: https://github.com/Bluecoastroleplay/illenium-appearance/archive/refs/heads/main.zip
  - action: unzip
    dest: ./tmp
    src: ./tmp/illenium-appearance.zip
  - action: move_path
    src: ./tmp/illenium-appearance-main
    dest: ./resources/[standalone]/illenium-appearance

  - action: download_github
    dest: ./resources/[standalone]/MugShotBase64
    ref: main
    src: https://github.com/BaziForYou/MugShotBase64
    subpath: MugShotBase64

  - action: download_file
    url: https://raw.githubusercontent.com/BaziForYou/MugShotBase64/main/README.md
    path: ./resources/[standalone]/MugShotBase64/README.md

  - action: download_file
    url: https://raw.githubusercontent.com/BaziForYou/MugShotBase64/main/LICENSE.md
    path: ./resources/[standalone]/MugShotBase64/LICENSE.md

  - action: download_file
    path: ./tmp/loadscreen.zip
    url: https://github.com/D4isDAVID/loadscreen/releases/latest/download/loadscreen.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/loadscreen.zip
  - action: copy_path
    src: ./myLogo.png
    dest: ./resources/[standalone]/loadscreen/html/assets/logo.png
    overwrite: true

  - action: download_file
    path: ./tmp/mana_audio.zip
    url: https://github.com/Manason/mana_audio/releases/latest/download/mana_audio.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/mana_audio.zip

  # VOICE
  - action: download_github
    dest: ./resources/[voice]/pma-voice
    ref: main
    src: https://github.com/AvarianKnight/pma-voice

  - action: download_file
    path: ./tmp/mm_radio.zip
    url: https://github.com/qbox-project/mm_radio/releases/latest/download/mm_radio.zip
  - action: unzip
    dest: ./resources/[voice]
    src: ./tmp/mm_radio.zip

  # Downloading Qbox resources
  - action: download_file
    path: ./tmp/qbx_core.zip
    url: https://github.com/qbox-project/qbx_core/releases/latest/download/qbx_core.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_core.zip
  - action: query_database
    file: ./resources/[qbx]/qbx_core/qbx_core.sql

  - action: download_file
    path: ./tmp/qbx_vehicles.zip
    url: https://github.com/qbox-project/qbx_vehicles/releases/latest/download/qbx_vehicles.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_vehicles.zip
  - action: query_database
    file: ./resources/[qbx]/qbx_vehicles/vehicles.sql

  - action: download_file
    path: ./tmp/qbx_management.zip
    url: https://github.com/qbox-project/qbx_management/releases/latest/download/qbx_management.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_management.zip

  - action: waste_time # prevent github throttling
    seconds: 10

  - action: download_file
    path: ./tmp/Renewed-Weathersync.zip
    url: https://github.com/Renewed-Scripts/Renewed-Weathersync/releases/latest/download/Renewed-Weathersync.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/Renewed-Weathersync.zip

  - action: download_file
    path: ./tmp/vehiclehandler.zip
    url: https://github.com/QuantumMalice/vehiclehandler/releases/latest/download/vehiclehandler.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/vehiclehandler.zip

  - action: download_github
    dest: ./resources/[qbx]/qbx_garages
    ref: main
    src: https://github.com/Bluecoastroleplay/qbx_garages

  - action: download_file
    path: ./tmp/qbx_smallresources.zip
    url: https://github.com/qbox-project/qbx_smallresources/releases/latest/download/qbx_smallresources.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_smallresources.zip

  # Required for server.cfg qbx_chat:* join/quit + Mantine theme (stock Qbox includes this)
  - action: download_github
    dest: ./resources/[qbx]/qbx_chat_theme
    ref: main
    src: https://github.com/Qbox-project/qbx_chat_theme

  - action: download_github
    dest: ./resources/[qbx]/qbx_radialmenu
    ref: main
    src: https://github.com/Bluecoastroleplay/qbx_radialmenu

  - action: download_github
    dest: ./resources/[qbx]/qbx_scoreboard
    ref: main
    src: https://github.com/qbox-project/qbx_scoreboard

  - action: download_file
    path: ./tmp/qbx_density.zip
    url: https://github.com/qbox-project/qbx_density/releases/latest/download/qbx_density.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_density.zip

  - action: download_file
    path: ./tmp/qbx_adminmenu.zip
    url: https://github.com/qbox-project/qbx_adminmenu/releases/latest/download/qbx_adminmenu.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_adminmenu.zip

  - action: download_github
    dest: ./resources/[qbx]/qbx_hud
    ref: main
    src: https://github.com/Bluecoastroleplay/qbx_hud

  - action: download_file
    path: ./tmp/qbx_spawn.zip
    url: https://github.com/qbox-project/qbx_spawn/releases/latest/download/qbx_spawn.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_spawn.zip

  - action: download_file
    path: ./tmp/qbx_customs.zip
    url: https://github.com/qbox-project/qbx_customs/releases/latest/download/qbx_customs.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_customs.zip

  - action: download_file
    path: ./tmp/qbx_vehiclekeys.zip
    url: https://github.com/qbox-project/qbx_vehiclekeys/releases/latest/download/qbx_vehiclekeys.zip
  - action: unzip
    dest: ./resources/[qbx]
    src: ./tmp/qbx_vehiclekeys.zip

  # OX
  - action: download_file
    path: ./tmp/ox_lib.zip
    url: https://github.com/communityox/ox_lib/releases/latest/download/ox_lib.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_lib.zip

  - action: download_file
    path: ./tmp/ox_target.zip
    url: https://github.com/communityox/ox_target/releases/latest/download/ox_target.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_target.zip

  - action: download_file
    path: ./tmp/oxmysql.zip
    url: https://github.com/communityox/oxmysql/releases/latest/download/oxmysql.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/oxmysql.zip

  - action: download_file
    path: ./tmp/ox_doorlock.zip
    url: https://github.com/communityox/ox_doorlock/releases/latest/download/ox_doorlock.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_doorlock.zip

  - action: download_file
    path: ./tmp/ox_inventory.zip
    url: https://github.com/communityox/ox_inventory/releases/latest/download/ox_inventory.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_inventory.zip

  # Items + icons: Oxdata only (skip duplicate tmp/qbox/items.lua — same as stock baseline then throw away)
  - action: download_github
    dest: ./tmp/oxdata
    ref: main
    src: https://github.com/Bluecoastroleplay/Oxdata

  - action: move_path
    src: ./tmp/oxdata/data/items.lua
    dest: ./resources/[ox]/ox_inventory/data/items.lua
    overwrite: true

  - action: copy_path
    src: ./tmp/oxdata/web/images
    dest: ./resources/[ox]/ox_inventory/web/images
    overwrite: true

  - action: download_github
    dest: ./resources/[ox]/ox_fuel
    ref: main
    src: https://github.com/communityox/ox_fuel

  # Bluecoast Roleplay — custom resources (https://github.com/Bluecoastroleplay)
  - action: waste_time
    seconds: 5

  - action: download_github
    dest: ./resources/[standalone]/bcrp_satmap
    ref: main
    src: https://github.com/Bluecoastroleplay/bcrp_satmap

  - action: download_github
    dest: ./resources/[standalone]/bc-mdt
    ref: main
    src: https://github.com/Bluecoastroleplay/bc-mdt

  - action: download_github
    dest: ./resources/[standalone]/policesystem
    ref: main
    src: https://github.com/Bluecoastroleplay/policesystem

  - action: download_github
    dest: ./resources/[standalone]/gs_robbery
    ref: main
    src: https://github.com/Bluecoastroleplay/gs_robbery

  - action: download_github
    dest: ./resources/[standalone]/bcrp_trucking
    ref: main
    src: https://github.com/Bluecoastroleplay/bcrp_trucking

  - action: download_github
    dest: ./resources/[standalone]/qbx_blackmarket
    ref: main
    src: https://github.com/Bluecoastroleplay/qbx_blackmarket

  - action: download_github
    dest: ./resources/[standalone]/qbx_cocaine
    ref: main
    src: https://github.com/Bluecoastroleplay/qbx_cocaine

  - action: download_github
    dest: ./resources/[standalone]/qbx_drugs
    ref: main
    src: https://github.com/Bluecoastroleplay/qbx_drugs

  - action: download_github
    dest: ./resources/[standalone]/qbx_rolling
    ref: main
    src: https://github.com/Bluecoastroleplay/qbx_rolling

  - action: download_github
    dest: ./resources/[standalone]/qbx_weed
    ref: main
    src: https://github.com/Bluecoastroleplay/qbx_weed

  # ASSETS
  - action: download_github
    dest: ./resources/[assets]/pillbox
    ref: main
    src: https://github.com/Lorenc95/pillbox

  - action: query_database
    file: ./resources/[standalone]/bc-mdt/sql/install.sql

  - action: query_database
    file: ./resources/[standalone]/bc-mdt/sql/penal_codes.sql

  - action: query_database
    file: ./resources/[standalone]/qbx_weed/sql/qbx_weed.sql

  - action: query_database
    file: ./resources/[standalone]/qbx_cocaine/sql/qbx_cocaine.sql

  - action: query_database
    file: ./resources/[standalone]/qbx_drugs/qbx_drugs.sql

  # Clean up
  - action: remove_path
    path: ./tmp